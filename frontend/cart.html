<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — MyStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="logo">🛍️ MyStore</a>
        <nav class="header-nav">
            <a href="index.html">Каталог</a>
            <a href="cart.html" class="active">Корзина <span id="cart-count" class="badge">0</span></a>
            <a href="login.html" id="login-link">Войти</a>
            <span id="user-greeting" class="user-greeting" style="display:none;"></span>
        </nav>
    </header>

    <div class="container">
        <h1>Корзина</h1>
        <div id="cart-items">
        </div>
        <div id="cart-summary" class="cart-summary" style="display:none;">
            <div class="cart-total">
                <span>Итого:</span>
                <strong id="total-price">$0.00</strong>
            </div>
            <button class="btn-primary" id="checkout-btn">Оформить заказ</button>
        </div>
        <div id="error-message" class="error-message" style="display:none;"></div>
    </div>

    <script>
        // API базовый URL - используется относительный путь, так как nginx проксирует все запросы
        const API = '';
        const token = localStorage.getItem('token');

        // Функция для отображения ошибок
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        if (!token) {
            document.getElementById('cart-items').innerHTML = '<p class="empty-message">Войдите, чтобы увидеть корзину.</p>';
            document.getElementById('cart-summary').style.display = 'none';
        } else {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('user-greeting').style.display = 'inline';
            document.getElementById('user-greeting').textContent = '👤 ' + (localStorage.getItem('username') || 'Пользователь');
            loadCart();
        }

        async function loadCart() {
            try {
                const res = await fetch(`${API}/cart/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) {
                    if (res.status === 401) {
                        // Токен недействителен, удаляем его и перенаправляем на вход
                        localStorage.removeItem('token');
                        localStorage.removeItem('username');
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error('Ошибка загрузки корзины');
                }
                
                const items = await res.json();
                renderCart(items);
            } catch(e) {
                console.error('Ошибка при загрузке корзины:', e);
                showError('Не удалось загрузить корзину. Проверьте подключение к серверу.');
                document.getElementById('cart-items').innerHTML = '<p class="error-message">Не удалось загрузить корзину</p>';
            }
        }

        function renderCart(items) {
            const container = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');
            document.getElementById('cart-count').textContent = items.length;

            if (!items.length) {
                container.innerHTML = '<p class="empty-message">Корзина пуста</p>';
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';
            let total = 0;
            container.innerHTML = items.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-image">
                            <img src="${item.image || 'https://via.placeholder.com/80'}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
                        </div>
                        <div class="cart-item-info">
                            <h3>${item.title}</h3>
                            <div class="cart-item-controls">
                                <span class="quantity">${item.quantity} шт.</span>
                                <span class="item-total">$${itemTotal.toFixed(2)}</span>
                                <button class="btn-remove" onclick="removeFromCart(${item.id})">✕</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('total-price').textContent = `$${total.toFixed(2)}`;
        }

        async function removeFromCart(itemId) {
            try {
                const res = await fetch(`${API}/cart/${itemId}/`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    loadCart();
                } else {
                    const error = await res.json();
                    alert(`Ошибка: ${error.detail || 'Не удалось удалить товар'}`);
                }
            } catch (e) {
                console.error('Ошибка при удалении из корзины:', e);
                alert('Произошла ошибка при удалении товара');
            }
        }

        document.getElementById('checkout-btn').addEventListener('click', () => {
            alert('Заказ оформлен! (заглушка)');
        });
    </script>
</body>
</html>
