<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — MyStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="logo">🛍️ MyStore</a>
        <nav class="header-nav">
            <a href="index.html" class="active">Каталог</a>
            <a href="cart.html">Корзина <span id="cart-count" class="badge">0</span></a>
            <a href="login.html" id="login-link">Войти</a>
            <span id="user-greeting" class="user-greeting" style="display:none;"></span>
        </nav>
    </header>

    <div class="container">
        <div class="catalog-header">
            <h1>Все товары</h1>
            <div class="search-bar">
                <input type="text" id="search" placeholder="Поиск по названию...">
            </div>
        </div>
        <div id="product-grid" class="product-grid">
        </div>
        <div id="error-message" class="error-message" style="display:none;"></div>
    </div>

    <script>
        // API базовый URL - используется относительный путь, так как nginx проксирует все запросы
        const API = '';
        const token = localStorage.getItem('token');

        // Функция для отображения ошибок
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        async function updateNav() {
            if (token) {
                document.getElementById('login-link').style.display = 'none';
                const greet = document.getElementById('user-greeting');
                greet.style.display = 'inline';
                greet.textContent = '👤 ' + (localStorage.getItem('username') || 'Пользователь');
            }
            if (token) {
                try {
                    const res = await fetch(`${API}/cart/`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const items = await res.json();
                        document.getElementById('cart-count').textContent = items.length;
                    }
                } catch(e) {
                    console.error('Ошибка при загрузке корзины:', e);
                }
            }
        }

        async function loadProducts(search = '') {
            try {
                const url = search ? `${API}/products/?search=${encodeURIComponent(search)}` : `${API}/products/`;
                const res = await fetch(url);
                
                if (!res.ok) {
                    throw new Error(`Ошибка сервера: ${res.status}`);
                }
                
                const products = await res.json();
                const grid = document.getElementById('product-grid');
                
                if (products.length === 0) {
                    grid.innerHTML = '<p class="empty-message">Товары не найдены</p>';
                    return;
                }
                
                grid.innerHTML = products.map(p => `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${p.image}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${p.title}</h3>
                            <p class="product-desc">${p.description ? p.description.slice(0, 80) + '...' : 'Описание отсутствует'}</p>
                            <div class="product-footer">
                                <span class="product-price">$${p.price}</span>
                                <button class="btn-add-cart" onclick="addToCart(${p.id})" ${!token ? 'disabled' : ''}>
                                    ${token ? 'В корзину' : 'Войдите'}
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Ошибка при загрузке товаров:', e);
                showError('Не удалось загрузить товары. Проверьте подключение к серверу.');
            }
        }

        async function addToCart(productId) {
            if (!token) {
                alert('Сначала войдите в систему');
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const res = await fetch(`${API}/cart/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ product_id: productId, quantity: 1 })
                });
                
                if (res.ok) {
                    updateNav();
                    alert('Добавлено в корзину!');
                } else {
                    const error = await res.json();
                    alert(`Ошибка: ${error.detail || 'Не удалось добавить в корзину'}`);
                }
            } catch (e) {
                console.error('Ошибка при добавлении в корзину:', e);
                alert('Произошла ошибка при добавлении в корзину');
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            loadProducts(e.target.value);
        });

        // Загружаем товары и обновляем навигацию при загрузке страницы
        loadProducts();
        updateNav();
    </script>
</body>
</html>
