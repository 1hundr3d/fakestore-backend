<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — MyStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-logo">🛍️ MyStore</h1>
            <div class="auth-tabs">
                <button class="tab active" id="tab-login">Вход</button>
                <button class="tab" id="tab-register">Регистрация</button>
            </div>
            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-username">Логин</label>
                    <input type="text" id="login-username" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" placeholder="Введите пароль" required>
                </div>
                <button id="login-button" class="btn-primary">Войти</button>
                <p id="login-message" class="message"></p>
            </div>
            <div id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="reg-username">Логин</label>
                    <input type="text" id="reg-username" placeholder="Придумайте логин" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль</label>
                    <input type="password" id="reg-password" placeholder="Придумайте пароль" required>
                </div>
                <button id="reg-button" class="btn-primary">Зарегистрироваться</button>
                <p id="register-message" class="message"></p>
            </div>
        </div>
    </div>
    <script>
        // API базовый URL - используется относительный путь, так как nginx проксирует все запросы
        const API = '';

        // Функция для отображения сообщений
        function showMessage(elementId, message, isError = true) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = isError ? 'message error' : 'message success';
        }

        // Переключение между вкладками
        document.getElementById('tab-login').addEventListener('click', () => {
            document.getElementById('login-form').classList.add('active');
            document.getElementById('register-form').classList.remove('active');
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-register').classList.remove('active');
            // Очищаем сообщения
            document.getElementById('login-message').textContent = '';
            document.getElementById('register-message').textContent = '';
        });

        document.getElementById('tab-register').addEventListener('click', () => {
            document.getElementById('register-form').classList.add('active');
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('tab-register').classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
            // Очищаем сообщения
            document.getElementById('login-message').textContent = '';
            document.getElementById('register-message').textContent = '';
        });

        // Обработчик входа
        document.getElementById('login-button').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showMessage('login-message', 'Введите логин и пароль', true);
                return;
            }

            try {
                const res = await fetch(`${API}/auth/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Сохраняем токен и имя пользователя
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', username);
                    // Перенаправляем на главную
                    window.location.href = 'index.html';
                } else {
                    showMessage('login-message', data.detail || 'Ошибка входа', true);
                }
            } catch (e) {
                console.error('Ошибка при входе:', e);
                showMessage('login-message', 'Не удалось подключиться к серверу', true);
            }
        });

        // Обработчик регистрации
        document.getElementById('reg-button').addEventListener('click', async () => {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;

            if (!username || !password) {
                showMessage('register-message', 'Введите логин и пароль', true);
                return;
            }

            if (username.length < 3) {
                showMessage('register-message', 'Логин должен быть не менее 3 символов', true);
                return;
            }

            if (password.length < 6) {
                showMessage('register-message', 'Пароль должен быть не менее 6 символов', true);
                return;
            }

            try {
                const res = await fetch(`${API}/auth/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Сохраняем токен и имя пользователя
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', username);
                    // Перенаправляем на главную
                    window.location.href = 'index.html';
                } else {
                    showMessage('register-message', data.detail || 'Ошибка регистрации', true);
                }
            } catch (e) {
                console.error('Ошибка при регистрации:', e);
                showMessage('register-message', 'Не удалось подключиться к серверу', true);
            }
        });

        // Обработка нажатия Enter
        document.getElementById('login-username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('login-button').click();
        });
        document.getElementById('login-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('login-button').click();
        });
        document.getElementById('reg-username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('reg-button').click();
        });
        document.getElementById('reg-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('reg-button').click();
        });
    </script>
</body>
</html>
