<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — MyStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-logo">🛍️ MyStore</h1>
            <div class="auth-tabs">
                <button class="tab active" id="tab-login">Вход</button>
                <button class="tab" id="tab-register">Регистрация</button>
            </div>
            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-username">Логин</label>
                    <input type="text" id="login-username" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" placeholder="Введите пароль" required>
                </div>
                <button id="login-button" class="btn-primary">Войти</button>
                <p id="login-message" class="message"></p>
            </div>
            <div id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="reg-username">Логин</label>
                    <input type="text" id="reg-username" placeholder="Придумайте логин" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль</label>
                    <input type="password" id="reg-password" placeholder="Придумайте пароль" required>
                </div>
                <button id="reg-button" class="btn-primary">Зарегистрироваться</button>
                <p id="register-message" class="message"></p>
            </div>
        </div>
    </div>
    <script>
        const API = '';

        document.getElementById('tab-login').addEventListener('click', () => {
            document.getElementById('login-form').classList.add('active');
            document.getElementById('register-form').classList.remove('active');
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-register').classList.remove('active');
        });
        document.getElementById('tab-register').addEventListener('click', () => {
            document.getElementById('register-form').classList.add('active');
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('tab-register').classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
        });

        document.getElementById('login-button').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            if (!username || !password) {
                document.getElementById('login-message').textContent = 'Введите логин и пароль';
                return;
            }
            const res = await fetch('/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.access_token);
                window.location.href = '/index.html';
            } else {
                document.getElementById('login-message').textContent = data.detail || 'Ошибка входа';
            }
        });

        document.getElementById('reg-button').addEventListener('click', async () => {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            if (!username || !password) {
                document.getElementById('register-message').textContent = 'Введите логин и пароль';
                return;
            }
            const res = await fetch('/auth/register/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.access_token);
                window.location.href = '/index.html';
            } else {
                document.getElementById('register-message').textContent = data.detail || 'Ошибка регистрации';
            }
        });
    </script>
</body>
</html>
