version: "3.8"

services:
    db:
        image: postgres:15
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: fakestore
        ports: 
          - "5432:5432"
        volumes:
          - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin -d fakestore"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7
        ports:
          - "6379:6379"
        volumes:
          - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

    app:
        build: .
        ports:
          - "8000:8000"
        environment:
            DATABASE_URL: postgresql://admin:secret@db:5432/fakestore
            REDIS_URL: redis://redis:6379/0
            SECRET_KEY: supersecretkey123
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: on-failure
        command: >
          sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

    prometheus:
        image: prom/prometheus
        ports:
          - "9090:9090"
        volumes:
          - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        depends_on:
          - app

    grafana:
        image: grafana/grafana
        ports:
          - "3000:3000"
        environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  postgres_data:
  redis_data: